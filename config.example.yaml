# corp-probe 配置文件
# 认证优先级：CLI参数 > 环境变量 > 配置文件

# 数据源认证
sources:
  aiqicha:
    cookie: ""
    # 或通过环境变量 CORP_PROBE_AIQICHA_COOKIE
  qichacha:
    cookie: ""
    # 或通过环境变量 CORP_PROBE_QICHACHA_COOKIE
  gsxt:
    cookie: ""
  miit:
    proxy: ""
  qimai:
    api_key: ""
  coolapk:
    cookie: ""

# 股权穿透默认参数
equity:
  default_depth: 2
  default_ratio: 51
  include_branch: false

# 缓存配置
cache:
  enabled: true
  db_path: "./data/cache.db"
  ttl: "720h"  # 30天

# 运行参数
runtime:
  concurrency: 5
  delay: "1s"
  timeout: "30s"
  retry: 3
  proxy: ""
  output_dir: "./results"
